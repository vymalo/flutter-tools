name: 'App Store submit (Vymalo)'
description: >-
  Upload an IPA and/or screenshots to App Store Connect via Fastlane deliver
  (upload_to_app_store), optionally submitting the version for review. deliver
  attaches to an EDITABLE App Store version, so app-version (x.y.z) must exist on
  App Store Connect. Auth is an ASC API key. No Docker.

inputs:
  workspace:
    default: ${{ github.workspace }}
  project-dir:
    default: 'mobile'
  ipa:
    description: 'IPA path (binary mode). Default: first under build/ios/ipa.'
    default: ''
  app-version:
    description: 'Marketing x.y.z. Default: read from pubspec.'
    default: ''
  screenshots-path:
    description: 'Screenshots dir to deliver (screenshots mode).'
    default: ''
  submit-for-review:
    default: 'false'
  skip-binary-upload:
    description: 'Screenshots-only upload.'
    default: 'false'
  skip-screenshots:
    default: 'true'
  overwrite-screenshots:
    default: 'false'
  asc-key-id:
    default: ''
  asc-issuer-id:
    default: ''
  asc-api-key-base64:
    default: ''

runs:
  using: composite
  steps:
    # The CLI shells out to bare `fastlane`, so it must be on PATH. A self-hosted
    # Mac runner may only have it via Bundler (vendor/bundle) — install a global
    # one when absent. No-op when fastlane is already on PATH.
    - name: Ensure fastlane
      shell: bash
      run: command -v fastlane >/dev/null 2>&1 || gem install fastlane --no-document --version '~>2.230'

    - id: install
      shell: bash
      env:
        FT_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        # github.action_path is NOT translated into the container by the GH
        # runner under podman → a path-based call ENOENTs. Fetch the installer
        # from the pinned ref (container/runtime-agnostic).
        curl --fail --silent --show-error --location --retry 3 \
          "https://raw.githubusercontent.com/vymalo/flutter-tools/${FT_REF}/scripts/install-cli.sh" \
          | bash -s --

    - shell: bash
      env:
        APP_STORE_CONNECT_KEY_ID: ${{ inputs.asc-key-id }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ inputs.asc-issuer-id }}
        APP_STORE_CONNECT_API_KEY_BASE64: ${{ inputs.asc-api-key-base64 }}
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_PROJECT_DIR: ${{ inputs.project-dir }}
        INPUT_SUBMIT_FOR_REVIEW: ${{ inputs.submit-for-review }}
        INPUT_SKIP_BINARY_UPLOAD: ${{ inputs.skip-binary-upload }}
        INPUT_SKIP_SCREENSHOTS: ${{ inputs.skip-screenshots }}
        INPUT_OVERWRITE_SCREENSHOTS: ${{ inputs.overwrite-screenshots }}
        INPUT_IPA: ${{ inputs.ipa }}
        INPUT_APP_VERSION: ${{ inputs.app-version }}
        INPUT_SCREENSHOTS_PATH: ${{ inputs.screenshots-path }}
      run: |
        set -euo pipefail
        args=(
          app-store-submit
          --workspace "$INPUT_WORKSPACE"
          --project-dir "$INPUT_PROJECT_DIR"
          --$([ "$INPUT_SUBMIT_FOR_REVIEW" = 'true' ] && echo 'submit-for-review' || echo 'no-submit-for-review')
          --$([ "$INPUT_SKIP_BINARY_UPLOAD" = 'true' ] && echo 'skip-binary-upload' || echo 'no-skip-binary-upload')
          --$([ "$INPUT_SKIP_SCREENSHOTS" = 'true' ] && echo 'skip-screenshots' || echo 'no-skip-screenshots')
          --$([ "$INPUT_OVERWRITE_SCREENSHOTS" = 'true' ] && echo 'overwrite-screenshots' || echo 'no-overwrite-screenshots')
        )
        [ -n "$INPUT_IPA" ]              && args+=(--ipa "$INPUT_IPA")
        [ -n "$INPUT_APP_VERSION" ]      && args+=(--app-version "$INPUT_APP_VERSION")
        [ -n "$INPUT_SCREENSHOTS_PATH" ] && args+=(--screenshots-path "$INPUT_SCREENSHOTS_PATH")
        "${{ steps.install.outputs.cli }}" "${args[@]}"