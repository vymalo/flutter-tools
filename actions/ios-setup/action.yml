name: 'iOS setup (Vymalo)'
description: >-
  Get a macOS runner iOS-build-ready: Flutter + Java + the layered codegen +
  Bundler (fastlane/cocoapods) + pod install. The iOS counterpart of
  android-setup. Uses the system/Homebrew Ruby (NOT ruby/setup-ruby, which
  assumes a hosted-runner toolcache a self-hosted Mac Mini doesn't have).

inputs:
  workspace:
    default: ${{ github.workspace }}
  project-dir:
    default: 'mobile'
  api-pubspec-template:
    description: 'Tracked pubspec template copied to <project-dir>/api/pubspec.yaml.'
    default: 'mobile/tool/api-pubspec.template.yaml'
  clean:
    description: 'Drop pubspec.lock + build_runner clean before the API build.'
    default: 'true'
  run-codegen:
    default: 'false'
  setup-flutter:
    default: 'true'
  setup-java:
    default: 'true'
  pod-install:
    default: 'true'
  flutter-version:
    default: '3.44.2'
  flutter-channel:
    default: 'stable'
  java-version:
    default: '21'

runs:
  using: composite
  steps:
    - name: Set up Flutter
      if: ${{ inputs.setup-flutter == 'true' }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ inputs.flutter-version }}
        channel: ${{ inputs.flutter-channel }}
        cache: true

    - name: Set up Java
      if: ${{ inputs.setup-java == 'true' }}
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Install flutter-tools CLI
      if: ${{ inputs.run-codegen == 'true' }}
      id: install
      shell: bash
      env:
        FT_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        # github.action_path is NOT translated into the container by the GH
        # runner under podman → a path-based call ENOENTs. Fetch the installer
        # from the pinned ref (container/runtime-agnostic).
        curl --fail --silent --show-error --location --retry 3 \
          "https://raw.githubusercontent.com/vymalo/flutter-tools/${FT_REF}/scripts/install-cli.sh" \
          | bash -s --

    - name: Layered codegen
      if: ${{ inputs.run-codegen == 'true' }}
      shell: bash
      env:
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_PROJECT_DIR: ${{ inputs.project-dir }}
        INPUT_API_PUBSPEC_TEMPLATE: ${{ inputs.api-pubspec-template }}
        INPUT_CLEAN: ${{ inputs.clean }}
      run: >-
        "${{ steps.install.outputs.cli }}" codegen
        --workspace "$INPUT_WORKSPACE"
        --project-dir "$INPUT_PROJECT_DIR"
        --api-pubspec-template "$INPUT_API_PUBSPEC_TEMPLATE"
        --$([ "$INPUT_CLEAN" = 'true' ] && echo 'clean' || echo 'no-clean')

    - name: Cache Bundler
      uses: actions/cache@v6
      with:
        path: ${{ inputs.project-dir }}/vendor/bundle
        key: bundler-${{ hashFiles(format('{0}/Gemfile', inputs.project-dir)) }}
        restore-keys: bundler-

    - name: Bundle install (fastlane + cocoapods)
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: bundle config set path 'vendor/bundle' && bundle install --jobs 4

    # Expose `fastlane` on PATH for later steps. ios-build / *-submit shell out to
    # a bare `fastlane`, but a self-hosted Mac runner only has it via Bundler. Make
    # the BUNDLED fastlane (just installed) available as a plain `fastlane` binstub
    # (with BUNDLE_GEMFILE so it resolves from any cwd), falling back to a global
    # gem. No-op when fastlane is already on PATH. (GITHUB_PATH/GITHUB_ENV persist
    # to subsequent steps in the same job.)
    - name: Expose fastlane on PATH
      shell: bash
      working-directory: ${{ inputs.project-dir }}
      run: |
        set -euo pipefail
        if command -v fastlane >/dev/null 2>&1; then
          echo "fastlane already on PATH: $(command -v fastlane)"
          exit 0
        fi
        # ios-build / *-submit shell out to a bare `fastlane`, but a self-hosted Mac
        # runner only has it via Bundler. Drop a wrapper on PATH that runs the
        # BUNDLED fastlane (BUNDLE_GEMFILE pinned so it resolves from any cwd).
        # (A plain script, not `bundle binstubs --path`, whose flag is removed in
        # current Bundler.) Falls back to a global gem if fastlane isn't bundled.
        mkdir -p "$RUNNER_TEMP/flbin"
        if bundle show fastlane >/dev/null 2>&1; then
          {
            echo '#!/usr/bin/env bash'
            echo "export BUNDLE_GEMFILE=\"$(pwd)/Gemfile\""
            echo 'exec bundle exec fastlane "$@"'
          } > "$RUNNER_TEMP/flbin/fastlane"
          chmod +x "$RUNNER_TEMP/flbin/fastlane"
          echo "$RUNNER_TEMP/flbin" >> "$GITHUB_PATH"
          echo "Wrapped bundled fastlane at $RUNNER_TEMP/flbin/fastlane"
        else
          gem install fastlane --no-document --version '~>2.230'
          echo "$(ruby -e 'puts Gem.bindir')" >> "$GITHUB_PATH"
          echo "Installed global fastlane to $(ruby -e 'puts Gem.bindir')"
        fi

    - name: Cache Pods
      if: ${{ inputs.pod-install == 'true' }}
      uses: actions/cache@v6
      with:
        path: ${{ inputs.project-dir }}/ios/Pods
        key: pods-${{ hashFiles(format('{0}/ios/Podfile', inputs.project-dir)) }}
        restore-keys: pods-

    - name: Pod install
      if: ${{ inputs.pod-install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.project-dir }}/ios
      run: bundle exec pod install