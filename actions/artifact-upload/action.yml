name: 'Artifact upload (Vymalo)'
description: >-
  Upload a build artifact (APK/AAB/IPA/…) to GitHub Artifacts and/or an
  S3-compatible store (S3, MinIO) and get a presigned download URL. Composes
  actions/upload-artifact + unfor19/install-aws-cli-action (both non-Docker).

inputs:
  file:
    description: 'Path to the artifact (relative to the workspace, or absolute).'
    required: true
  name:
    description: 'GitHub Artifact name (defaults to the file basename).'
    default: ''
  to-gh-artifacts:
    description: 'Upload to GitHub Artifacts.'
    default: 'true'
  retention-days:
    default: '30'
  to-s3:
    description: 'Upload to S3/MinIO and emit a presigned URL.'
    default: 'false'
  s3-bucket:
    default: ''
  s3-key:
    description: 'Object key (required when to-s3 is true).'
    default: ''
  s3-endpoint:
    description: 'S3-compatible endpoint URL (e.g. MinIO). Empty = real AWS S3.'
    default: ''
  s3-expires-in:
    description: 'Presigned-URL lifetime in seconds.'
    default: '604800'
  s3-make-bucket:
    description: 'Create the bucket if it does not exist.'
    default: 'true'

outputs:
  artifact-name:
    value: ${{ steps.meta.outputs.name }}
  s3-url:
    description: 'Presigned download URL (empty when to-s3 is false).'
    value: ${{ steps.s3.outputs.s3-url }}
  s3-key:
    value: ${{ steps.s3.outputs.s3-key }}

runs:
  using: composite
  steps:
    - id: meta
      shell: bash
      env:
        INPUT_FILE: ${{ inputs.file }}
        INPUT_NAME: ${{ inputs.name }}
      run: |
        file="$INPUT_FILE"
        abs="$(cd "$(dirname "$file")" 2>/dev/null && pwd)/$(basename "$file")" || abs="$file"
        name="$INPUT_NAME"
        [ -z "$name" ] && name="$(basename "$file")"
        echo "file-abs=$abs" >> "$GITHUB_OUTPUT"
        echo "name=$name" >> "$GITHUB_OUTPUT"

    - name: Upload to GitHub Artifacts
      if: ${{ inputs.to-gh-artifacts == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.meta.outputs.name }}
        path: ${{ inputs.file }}
        retention-days: ${{ inputs.retention-days }}

    # Only install the AWS CLI when it's absent. install-aws-cli-action installs to
    # /usr/local and fails on an Apple-Silicon macOS runner (where aws is typically
    # already present via Homebrew) — so prefer the existing binary, then brew on
    # macOS, and fall back to the installer action on Linux/Windows.
    - name: Detect AWS CLI
      id: awscli
      if: ${{ inputs.to-s3 == 'true' }}
      shell: bash
      run: |
        if command -v aws >/dev/null 2>&1; then
          echo "have=true" >> "$GITHUB_OUTPUT"
        elif [ "$RUNNER_OS" = "macOS" ] && command -v brew >/dev/null 2>&1 && brew install awscli; then
          echo "have=true" >> "$GITHUB_OUTPUT"
        else
          echo "have=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Install AWS CLI (Linux/Windows fallback)
      if: ${{ inputs.to-s3 == 'true' && steps.awscli.outputs.have != 'true' }}
      uses: unfor19/install-aws-cli-action@v1

    - id: install
      if: ${{ inputs.to-s3 == 'true' }}
      shell: bash
      env:
        FT_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        # github.action_path is NOT translated into the container by the GH
        # runner under podman → a path-based call ENOENTs. Fetch the installer
        # from the pinned ref (container/runtime-agnostic).
        curl --fail --silent --show-error --location --retry 3 \
          "https://raw.githubusercontent.com/vymalo/flutter-tools/${FT_REF}/scripts/install-cli.sh" \
          | bash -s --

    - id: s3
      if: ${{ inputs.to-s3 == 'true' }}
      shell: bash
      env:
        INPUT_S3_BUCKET: ${{ inputs.s3-bucket }}
        INPUT_S3_KEY: ${{ inputs.s3-key }}
        INPUT_S3_ENDPOINT: ${{ inputs.s3-endpoint }}
        INPUT_S3_EXPIRES_IN: ${{ inputs.s3-expires-in }}
        INPUT_S3_MAKE_BUCKET: ${{ inputs.s3-make-bucket }}
      run: |
        set -euo pipefail
        "${{ steps.install.outputs.cli }}" s3-upload \
          --file "${{ steps.meta.outputs.file-abs }}" \
          --bucket "$INPUT_S3_BUCKET" \
          --key "$INPUT_S3_KEY" \
          --endpoint "$INPUT_S3_ENDPOINT" \
          --expires-in "$INPUT_S3_EXPIRES_IN" \
          --$([ "$INPUT_S3_MAKE_BUCKET" = 'true' ] && echo 'make-bucket' || echo 'no-make-bucket')