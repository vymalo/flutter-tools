name: 'Release cut (Vymalo)'
description: >-
  Cut a release with NO PR-create permission and NO PAT. Computes the next semver
  from conventional commits since the last `<tag-prefix>*` tag (or an explicit
  bump), then tags it + creates a GitHub Release with auto-generated notes. Needs
  only `contents: write`. The semver/bump logic is a unit-tested Dart command; the
  tag + release is `softprops/action-gh-release`. Requires the repo checked out
  with full history + tags (actions/checkout with `fetch-depth: 0`) and Dart on
  PATH (a Flutter/Dart setup step first, e.g. this repo's android/ios-setup).

inputs:
  workspace:
    description: 'Repo root (git history + tags must be present).'
    default: ${{ github.workspace }}
  project-dir:
    description: 'Path scoping the conventional-commit scan + the pubspec fallback.'
    default: 'mobile'
  tag-prefix:
    description: 'Tag namespace, e.g. mobile-v → mobile-v1.2.3.'
    default: 'mobile-v'
  bump:
    description: 'auto (infer from commits) | patch | minor | major.'
    default: 'auto'
  title-prefix:
    description: 'GitHub Release title prefix (→ "<prefix> x.y.z").'
    default: 'Mobile'
  target:
    description: 'Commitish to tag.'
    default: ${{ github.sha }}

outputs:
  version:
    description: 'The cut marketing version x.y.z.'
    value: ${{ steps.compute.outputs.version }}
  tag:
    description: 'The created tag (<tag-prefix>x.y.z).'
    value: ${{ steps.compute.outputs.tag }}
  bump:
    description: 'The bump level applied (major | minor | patch).'
    value: ${{ steps.compute.outputs.bump }}

runs:
  using: composite
  steps:
    - id: compute
      shell: bash
      working-directory: ${{ github.action_path }}/../..
      # Route inputs through env (never interpolated into the script), so a value
      # from workflow_dispatch / repo vars can't break out and run shell. Needs
      # Dart on PATH (a Flutter/Dart setup step, or this repo's android/ios-setup).
      env:
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_PROJECT_DIR: ${{ inputs.project-dir }}
        INPUT_TAG_PREFIX: ${{ inputs.tag-prefix }}
        INPUT_BUMP: ${{ inputs.bump }}
        INPUT_REF: ${{ inputs.target }}
      run: |
        set -euo pipefail
        # Preflight: the version/bump need full history + tags. A shallow clone
        # would silently mis-baseline (no tags → wrong version). Fail loud instead.
        if [ "$(git -C "$INPUT_WORKSPACE" rev-parse --is-shallow-repository)" = "true" ]; then
          echo "::error::release-cut needs full history + tags — checkout with fetch-depth: 0." >&2
          exit 1
        fi
        dart pub get
        dart run bin/flutter_tools.dart release-cut \
          --workspace "$INPUT_WORKSPACE" \
          --project-dir "$INPUT_PROJECT_DIR" \
          --tag-prefix "$INPUT_TAG_PREFIX" \
          --bump "$INPUT_BUMP" \
          --ref "$INPUT_REF"

    # Tag + GitHub Release with auto-notes — creates the tag from `target`, so it
    # needs only contents: write (no PR, no PAT). A GITHUB_TOKEN-created tag does
    # not start other `push:` runs, so call the build from the SAME run if needed.
    - name: Tag + GitHub Release (auto-notes)
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.compute.outputs.tag }}
        target_commitish: ${{ inputs.target }}
        name: ${{ inputs.title-prefix }} ${{ steps.compute.outputs.version }}
        generate_release_notes: true
