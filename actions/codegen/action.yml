name: 'Flutter codegen (Vymalo)'
description: >-
  Layered Flutter codegen as one reusable step: OpenAPI Generator client →
  generated-API *.g.dart → app build_runner (riverpod/drift/go_router). The
  orchestration is a Dart CLI in this repo; this action just sets up the
  toolchain and runs it against the caller's workspace.

inputs:
  workspace:
    description: 'Repo root the dir inputs resolve against.'
    default: ${{ github.workspace }}
  project-dir:
    description: 'Flutter app directory.'
    default: 'mobile'
  api-dir:
    description: 'Generated OpenAPI client package directory.'
    default: 'mobile/api'
  codegen-tool-dir:
    description: 'Directory whose build_runner drives the OpenAPI Generator CLI.'
    default: 'mobile/tool/openapi_codegen'
  api-pubspec-template:
    description: >-
      Tracked pubspec template copied to <api-dir>/pubspec.yaml before resolve
      (also restores it on runners where api-dir is gitignored). Wins over
      sdk-floor when set.
    default: ''
  sdk-floor:
    description: 'SDK constraint forced into the generated API pubspec.'
    default: '>=3.12.0 <4.0.0'
  clean:
    description: 'Drop pubspec.lock + build_runner clean before the API build.'
    default: 'true'
  upgrade-dart-style:
    description: 'dart pub upgrade dart_style before the API build.'
    default: 'false'
  setup-flutter:
    description: 'Set up Flutter (disable if the caller already did).'
    default: 'true'
  setup-java:
    description: 'Set up Java for the OpenAPI Generator CLI.'
    default: 'true'
  flutter-version:
    description: 'Flutter version when setup-flutter is true.'
    default: '3.44.2'
  flutter-channel:
    default: 'stable'
  java-version:
    description: 'Temurin JDK version when setup-java is true.'
    default: '21'

runs:
  using: composite
  steps:
    - name: Set up Flutter
      if: ${{ inputs.setup-flutter == 'true' }}
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ inputs.flutter-version }}
        channel: ${{ inputs.flutter-channel }}
        cache: true

    - name: Set up Java (OpenAPI Generator CLI)
      if: ${{ inputs.setup-java == 'true' }}
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    # Fetch the prebuilt CLI binary (no `dart pub get`). The CLI still shells out
    # to `dart`/`flutter` for the actual codegen, which the setup above provides.
    - name: Install flutter-tools CLI
      id: install
      shell: bash
      env:
        FT_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        # github.action_path is NOT translated into the container by the GH
        # runner under podman → a path-based call ENOENTs. Fetch the installer
        # from the pinned ref (container/runtime-agnostic).
        curl --fail --silent --show-error --location --retry 3 \
          "https://raw.githubusercontent.com/vymalo/flutter-tools/${FT_REF}/scripts/install-cli.sh" \
          | bash -s --

    - name: Run layered codegen
      shell: bash
      env:
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_PROJECT_DIR: ${{ inputs.project-dir }}
        INPUT_API_DIR: ${{ inputs.api-dir }}
        INPUT_CODEGEN_TOOL_DIR: ${{ inputs.codegen-tool-dir }}
        INPUT_API_PUBSPEC_TEMPLATE: ${{ inputs.api-pubspec-template }}
        INPUT_SDK_FLOOR: ${{ inputs.sdk-floor }}
        INPUT_CLEAN: ${{ inputs.clean }}
        INPUT_UPGRADE_DART_STYLE: ${{ inputs.upgrade-dart-style }}
      run: >-
        "${{ steps.install.outputs.cli }}" codegen
        --workspace "$INPUT_WORKSPACE"
        --project-dir "$INPUT_PROJECT_DIR"
        --api-dir "$INPUT_API_DIR"
        --codegen-tool-dir "$INPUT_CODEGEN_TOOL_DIR"
        --api-pubspec-template "$INPUT_API_PUBSPEC_TEMPLATE"
        --sdk-floor "$INPUT_SDK_FLOOR"
        --$([ "$INPUT_CLEAN" = 'true' ] && echo 'clean' || echo 'no-clean')
        --$([ "$INPUT_UPGRADE_DART_STYLE" = 'true' ] && echo 'upgrade-dart-style' || echo 'no-upgrade-dart-style')