name: 'Version stamp (Vymalo)'
description: >-
  Stamp a build number into the Flutter app's pubspec.yaml
  (version: x.y.z+<build>) so every store upload gets a unique, increasing
  CFBundleVersion / versionCode. The marketing version (x.y.z) is kept from the
  file by default, or overridden via `version` (e.g. a git-tag-owned version).
  Never commits — stamps at build time.

inputs:
  workspace:
    description: 'Repo root the project-dir resolves against.'
    default: ${{ github.workspace }}
  project-dir:
    description: 'Flutter app directory (holds pubspec.yaml).'
    default: 'mobile'
  build-number:
    description: 'The +build value to stamp. Defaults to the CI run number.'
    default: ${{ github.run_number }}
  version:
    description: >-
      Marketing x.y.z to set (overrides pubspec — e.g. a git-tag version). Leave
      blank to keep the existing pubspec version and only re-stamp the +build.
    default: ''

outputs:
  version:
    description: 'Marketing version x.y.z (the override, or the file''s).'
    value: ${{ steps.stamp.outputs.version }}
  build-number:
    description: 'The stamped +build value.'
    value: ${{ steps.stamp.outputs.build-number }}
  full-version:
    description: 'x.y.z+<build>.'
    value: ${{ steps.stamp.outputs.full-version }}

runs:
  using: composite
  steps:
    # Fetch the prebuilt CLI binary (no Dart SDK, no `dart pub get`). Separate
    # step so its $GITHUB_OUTPUT path is readable by the stamp step below.
    - id: install
      shell: bash
      env:
        FT_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        # github.action_path is NOT translated into the container by the GH
        # runner under podman → a path-based call ENOENTs. Fetch the installer
        # from the pinned ref (container/runtime-agnostic).
        curl --fail --silent --show-error --location --retry 3 \
          "https://raw.githubusercontent.com/vymalo/flutter-tools/${FT_REF}/scripts/install-cli.sh" \
          | bash -s --
    - id: stamp
      shell: bash
      env:
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_PROJECT_DIR: ${{ inputs.project-dir }}
        INPUT_BUILD_NUMBER: ${{ inputs.build-number }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        args=(
          version-stamp
          --workspace "$INPUT_WORKSPACE"
          --project-dir "$INPUT_PROJECT_DIR"
          --build-number "$INPUT_BUILD_NUMBER"
        )
        [ -n "$INPUT_VERSION" ] && args+=(--version "$INPUT_VERSION")
        "${{ steps.install.outputs.cli }}" "${args[@]}"