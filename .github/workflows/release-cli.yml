# Build the flutter-tools CLI as a self-contained AOT binary for each runner
# OS/arch and publish them (plus SHA256SUMS) to a GitHub Release. The composite
# actions then download the matching binary at runtime instead of running
# `dart pub get` + `dart run` — killing the per-run dependency-resolution cost.
#
# `dart compile exe` cannot cross-compile, so each target gets its own runner.
#
# Run it manually from the Actions tab ("Run workflow"). The released version is
# read from cli-version.txt — bump that file (and merge it) to cut a new version,
# then dispatch. The run creates the `cli-v<version>` tag + Release at the chosen
# ref. No local `git tag` / push needed.
name: release-cli

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, asset: flutter-tools-linux-x64 }
          - { runner: ubuntu-24.04-arm, asset: flutter-tools-linux-arm64 }
          # macos-15 is the arm64 (Apple Silicon) image; Intel is macos-15-intel.
          # We don't ship a macОS x64 binary — GitHub macOS runners are arm64.
          - { runner: macos-15, asset: flutter-tools-macos-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - name: Compile AOT binary
        run: |
          mkdir -p dist
          dart compile exe bin/flutter_tools.dart -o "dist/${{ matrix.asset }}"
      - name: Checksum
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Resolve tag from cli-version.txt
        id: ver
        run: |
          version="$(tr -d ' \t\n\r' < cli-version.txt)"
          if [ -z "$version" ]; then
            echo "::error::cli-version.txt is empty"
            exit 1
          fi
          echo "tag=cli-v$version" >> "$GITHUB_OUTPUT"
          echo "Releasing cli-v$version from ${GITHUB_SHA}"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Assemble SHA256SUMS
        working-directory: artifacts
        run: |
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          echo "Published binaries:"
          cat SHA256SUMS
      # Creates the cli-v<version> tag at the dispatched commit if it doesn't
      # exist, then publishes (or updates) the Release with the binaries.
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/flutter-tools-*
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
