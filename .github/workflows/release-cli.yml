# Build the flutter-tools CLI as a self-contained AOT binary for each runner
# OS/arch and publish them (plus SHA256SUMS) to a GitHub Release. The composite
# actions then download the matching binary at runtime instead of running
# `dart pub get` + `dart run` — killing the per-run dependency-resolution cost.
#
# `dart compile exe` cannot cross-compile, so each target gets its own runner.
# Trigger by pushing a tag that matches cli-version.txt, e.g.:
#   git tag cli-v0.1.0 && git push origin cli-v0.1.0
name: release-cli

on:
  push:
    tags: ['cli-v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, asset: flutter-tools-linux-x64 }
          - { runner: ubuntu-24.04-arm, asset: flutter-tools-linux-arm64 }
          - { runner: macos-14, asset: flutter-tools-macos-arm64 }
          - { runner: macos-13, asset: flutter-tools-macos-x64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - name: Compile AOT binary
        run: |
          mkdir -p dist
          dart compile exe bin/flutter_tools.dart -o "dist/${{ matrix.asset }}"
      - name: Checksum
        working-directory: dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches cli-version.txt
        run: |
          want="cli-v$(tr -d ' \t\n\r' < cli-version.txt)"
          if [ "$want" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match cli-version.txt ($want)"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Assemble SHA256SUMS
        working-directory: artifacts
        run: |
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          echo "Published binaries:"
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/flutter-tools-*
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
