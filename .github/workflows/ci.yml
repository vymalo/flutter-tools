# CI for the flutter-tools CLI itself: format, analyze, test.
#
# Runs on the self-hosted ARC runner (GitHub-hosted runners are intentionally
# unused — this account bills only for its own runners). `dart` is already on
# PATH in the ghcr.io/vymalo/arc-runners image (it ships Flutter), so no SDK
# setup step is needed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: arc-runner-set-vymalo
    steps:
      - uses: actions/checkout@v6
      - run: dart --version
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: dart test
