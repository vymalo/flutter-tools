# CI for the flutter-tools CLI itself: format, analyze, test.
#
# This repo is PUBLIC, so GitHub-hosted runners are free — use the classic
# `ubuntu-latest` so anyone who forks the repo gets a working pipeline without a
# self-hosted runner. (The self-hosted ARC runner is only needed in the private
# org repos that consume these actions, where GitHub-hosted minutes are billed.)
# ubuntu-latest has no Dart SDK, so set it up explicitly.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dart-lang/setup-dart@v1
      - run: dart --version
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: dart test
