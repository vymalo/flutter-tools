# CI for the flutter-tools CLI itself: format, analyze, test.
#
# Runs on GitHub-hosted ubuntu (a ~30s job; free for public repos). To keep
# everything on your own runners instead, swap `runs-on` for a self-hosted
# label (e.g. arc-runner-set-vymalo) that has the Dart SDK.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      - run: dart test
